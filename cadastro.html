<form action="/enviar-dados" method="POST">
<label for="nome">Nome:</label>
<input type="text" id="nome" name="nome" required placeholder="Seu nome completo">

<label for="email">Email:</label>
<input type="email" id="email" name="email" required placeholder="Digite seu email">

<label for="idade">Idade:</label>
<input type="number" id="idade" name="idade" required placeholder="Digite sua idade">

<label for="telefone">Telefone:</label>
<input type="telefone" id="telefone" name="telefone" required placeholder="Digite seu telefone">

<label for="curso">Curso:</label>
<input type="curso" id="curso" name="curso" required placeholder="Digite o curso desejado">

<label for="Turno"></label>
<select id="Turno" name="Turno">
  <option value="manha">Manhã</option>
  <option value="tarde">Tarde</option>
  <option value="noite">Noite</option>
</select>

<button type="submit">Enviar:</button> 
</form>
